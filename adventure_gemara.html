<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Donkey Renter — Mishna Game</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1a0a2e;color:#eee;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.wrap{max-width:640px;width:100%}
.screen{display:none}.screen.active{display:block;animation:fadeUp .35s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ── SCENE CANVAS ── */
.scene-canvas{width:100%;height:200px;border-radius:16px 16px 0 0;position:relative;overflow:hidden;display:flex;align-items:flex-end}
.sky{position:absolute;top:0;left:0;right:0;bottom:0;transition:background 1s}
.ground{position:absolute;bottom:0;left:0;right:0;height:60px;border-radius:0;transition:background 1s}
.mountain{position:absolute;bottom:60px;transition:opacity .6s}
.mountain svg{display:block}
.cloud{position:absolute;top:20px;animation:drift 8s ease-in-out infinite alternate}
.cloud2{position:absolute;top:40px;animation:drift 11s ease-in-out infinite alternate-reverse}
@keyframes drift{from{transform:translateX(0)}to{transform:translateX(20px)}}
.sun{position:absolute;top:18px;right:24px;width:42px;height:42px;border-radius:50%;background:radial-gradient(circle,#ffe066,#ffb300);box-shadow:0 0 24px #ffb300aa;transition:all 1s}
.sun.valley{background:radial-gradient(circle,#ff8c00,#ff4500);box-shadow:0 0 30px #ff450088}

/* ── CHARACTERS ── */
.chars{position:absolute;bottom:60px;left:0;right:0;display:flex;align-items:flex-end;gap:0;transition:all .5s}

/* Shmerel - CSS character */
.shmerel{position:absolute;bottom:0;left:60px;transition:left .8s ease}
.shmerel-body{position:relative;width:40px}
.sh-hat{width:24px;height:10px;background:#2c1a6e;border-radius:3px 3px 0 0;margin:0 auto;position:relative}
.sh-hat::before{content:'';position:absolute;bottom:0;left:-4px;width:32px;height:4px;background:#2c1a6e;border-radius:2px}
.sh-head{width:22px;height:22px;background:#f5c592;border-radius:50% 50% 45% 45%;margin:0 auto;position:relative;z-index:2}
.sh-eyes{display:flex;justify-content:space-around;padding-top:7px;padding-left:2px;padding-right:2px}
.sh-eye{width:4px;height:4px;background:#222;border-radius:50%}
.sh-eye.happy{height:2px;border-radius:2px 2px 0 0;margin-top:1px}
.sh-eye.sad{transform:scaleY(-1) translateY(-2px)}
.sh-mouth{width:8px;height:4px;border:2px solid #a0522d;border-top:none;border-radius:0 0 4px 4px;margin:2px auto 0}
.sh-mouth.happy{border-bottom:none;border-top:2px solid #a0522d;border-radius:4px 4px 0 0;margin-top:4px}
.sh-mouth.sad{width:8px;border-radius:0 0 4px 4px}
.sh-beard{width:14px;height:6px;background:#8B4513;border-radius:0 0 6px 6px;margin:-1px auto 0;opacity:.7}
.sh-coat{width:28px;height:32px;background:#2c1a6e;border-radius:4px 4px 12px 12px;margin:0 auto;position:relative}
.sh-coat::before{content:'';position:absolute;top:4px;left:50%;transform:translateX(-50%);width:4px;height:20px;background:#1a0f4e;border-radius:2px}
.sh-legs{display:flex;justify-content:center;gap:4px;margin-top:1px}
.sh-leg{width:8px;height:14px;background:#1a0f4e;border-radius:0 0 3px 3px}
.sh-leg.walk1{animation:walk1 .4s ease-in-out infinite}
.sh-leg.walk2{animation:walk2 .4s ease-in-out infinite}
@keyframes walk1{0%,100%{transform:rotate(0deg) translateY(0)}50%{transform:rotate(15deg) translateY(-3px)}}
@keyframes walk2{0%,100%{transform:rotate(0deg) translateY(0)}50%{transform:rotate(-15deg) translateY(-3px)}}
.sh-arm-l{position:absolute;top:6px;left:-6px;width:8px;height:18px;background:#2c1a6e;border-radius:4px;transform-origin:top center}
.sh-arm-r{position:absolute;top:6px;right:-6px;width:8px;height:18px;background:#2c1a6e;border-radius:4px;transform-origin:top center}
.sh-arm-l.wave{animation:waveL .5s ease-in-out 3}
.sh-arm-r.hold{transform:rotate(-40deg)}
@keyframes waveL{0%,100%{transform:rotate(0)}50%{transform:rotate(-60deg)}}
.shmerel.bounce{animation:shBounce .3s ease 2}
@keyframes shBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.shmerel.shake{animation:shShake .4s ease}
@keyframes shShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* Donkey */
.donkey{position:absolute;bottom:0;left:120px;transition:left .8s ease,opacity .5s}
.donkey-body{position:relative;width:60px}
.dk-body{width:50px;height:28px;background:#9e9e9e;border-radius:12px 8px 8px 12px;position:relative;margin-left:5px}
.dk-head{width:24px;height:20px;background:#9e9e9e;border-radius:10px 12px 6px 8px;position:absolute;top:-10px;right:-14px}
.dk-ear{width:6px;height:12px;background:#7e7e7e;border-radius:3px;position:absolute;top:-10px;left:4px}
.dk-ear2{width:6px;height:12px;background:#7e7e7e;border-radius:3px;position:absolute;top:-10px;left:12px}
.dk-eye{width:4px;height:4px;background:#333;border-radius:50%;position:absolute;top:5px;right:4px}
.dk-nose{width:8px;height:5px;background:#888;border-radius:0 4px 4px 0;position:absolute;bottom:2px;right:-2px}
.dk-tail{width:4px;height:18px;background:#7e7e7e;border-radius:2px;position:absolute;top:4px;left:-2px;transform:rotate(20deg)}
.dk-legs{display:flex;gap:6px;margin-left:6px;margin-top:1px}
.dk-leg{width:7px;height:18px;background:#7e7e7e;border-radius:0 0 3px 3px}
.dk-leg.walk1{animation:walk1 .45s ease-in-out infinite}
.dk-leg.walk2{animation:walk2 .45s ease-in-out infinite}
.dk-leg.walk3{animation:walk1 .45s ease-in-out infinite .2s}
.dk-leg.walk4{animation:walk2 .45s ease-in-out infinite .2s}
.donkey.hurt{animation:hurt .5s ease}
@keyframes hurt{0%,100%{transform:translateY(0)}30%{transform:translateY(-8px) rotate(-5deg)}60%{transform:translateY(4px)}}

/* Speech bubble */
.bubble{position:absolute;background:#fff;color:#222;border-radius:12px;padding:7px 12px;font-size:12px;font-weight:600;white-space:nowrap;top:-38px;left:0;display:none;animation:popIn .2s ease;z-index:10;max-width:180px;white-space:normal;text-align:center;line-height:1.3}
.bubble::after{content:'';position:absolute;bottom:-8px;left:16px;border:5px solid transparent;border-top:8px solid #fff}
.bubble.show{display:block}
.bubble.heb{font-family:Georgia,serif;font-size:13px}
@keyframes popIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}

/* Trees / props */
.tree{position:absolute;bottom:58px}
.tree svg{display:block}

/* ── UI PANEL ── */
.ui-panel{background:#16213e;border-radius:0 0 16px 16px;padding:1.25rem}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.score-pill{background:#c99a2b22;border:1px solid #c99a2b;color:#c99a2b;border-radius:20px;padding:4px 14px;font-size:13px;font-weight:700}
.lives-row{font-size:18px;letter-spacing:2px}
.chapter-tag{font-size:11px;background:#2a2a4e;color:#aaa;border-radius:20px;padding:3px 10px;letter-spacing:.05em}
.progress-bar{height:5px;background:#2a2a4e;border-radius:3px;margin-bottom:1rem;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#c99a2b,#f0c040);border-radius:3px;transition:width .5s ease}
.scene-label{font-size:11px;color:#c99a2b;letter-spacing:.08em;text-transform:uppercase;margin-bottom:.3rem}
.scene-title{font-size:17px;font-weight:700;color:#f0c040;margin-bottom:.6rem;line-height:1.3}
.story-text{font-size:13px;color:#ccc;line-height:1.7;background:#0f1629;padding:11px 14px;border-radius:10px;margin-bottom:.9rem;border-left:3px solid #c99a2b}
.heb-line{font-family:Georgia,serif;font-size:15px;direction:rtl;text-align:right;color:#f0c040;background:#0f1629;padding:8px 12px;border-radius:8px;margin-bottom:.9rem;border-right:3px solid #c99a2b}
.q-text{font-size:14px;font-weight:600;color:#fff;margin-bottom:.6rem}
.choices{display:flex;flex-direction:column;gap:7px;margin-bottom:.9rem}
.choice{background:#1e2a4e;border:1.5px solid #2a3a6e;border-radius:10px;padding:10px 14px;cursor:pointer;font-size:13px;color:#ddd;text-align:left;font-family:inherit;transition:all .15s;line-height:1.4}
.choice:hover:not(:disabled){border-color:#c99a2b;background:#263050;color:#fff}
.choice.correct{border-color:#4caf50!important;background:#1a3a1a!important;color:#90ee90!important}
.choice.wrong{border-color:#e53935!important;background:#3a1a1a!important;color:#ff9090!important}
.choice:disabled{cursor:default}
.result-box{border-radius:10px;padding:12px 14px;margin-bottom:.9rem;font-size:13px;line-height:1.6;display:none}
.result-box.correct{background:#1a3a1a;border:1px solid #4caf50;color:#90ee90}
.result-box.wrong{background:#3a1a1a;border:1px solid #e53935;color:#ff9090}
.result-title{font-weight:700;margin-bottom:.3rem;font-size:14px}
.next-btn{width:100%;padding:11px;border-radius:10px;background:#c99a2b;color:#1a1a2e;border:none;cursor:pointer;font-size:15px;font-weight:700;font-family:inherit;display:none}
.next-btn:hover{opacity:.88}

/* ── TITLE SCREEN ── */
.title-wrap{background:#16213e;border-radius:16px;padding:2rem 1.5rem;text-align:center}
.game-logo{font-size:56px;margin-bottom:.5rem}
.game-title{font-size:28px;font-weight:800;color:#f0c040;margin-bottom:.2rem;text-shadow:0 0 20px #f0c04044}
.game-sub{font-family:Georgia,serif;font-size:16px;color:#c99a2b;margin-bottom:.5rem}
.game-desc{font-size:13px;color:#aaa;line-height:1.6;margin-bottom:1.5rem;max-width:400px;margin-left:auto;margin-right:auto}
.start-btn{background:linear-gradient(135deg,#c99a2b,#f0c040);color:#1a1a2e;border:none;padding:14px 36px;border-radius:12px;font-size:16px;font-weight:800;cursor:pointer;transition:transform .1s,box-shadow .1s;font-family:inherit;letter-spacing:.02em}
.start-btn:hover{transform:translateY(-3px);box-shadow:0 6px 20px #c99a2b55}

/* ── END SCREEN ── */
.end-wrap{background:#16213e;border-radius:16px;padding:2rem 1.5rem;text-align:center}
.end-trophy{font-size:70px;margin-bottom:.5rem;animation:spin .8s ease}
@keyframes spin{from{transform:rotate(-15deg) scale(.7)}to{transform:rotate(5deg) scale(1)}}
.end-title{font-size:26px;font-weight:800;color:#f0c040;margin-bottom:.25rem}
.end-score-big{font-size:52px;font-weight:800;color:#fff;margin:.5rem 0 .1rem}
.end-pct{font-size:14px;color:#aaa;margin-bottom:1rem}
.end-msg{font-size:14px;color:#ccc;background:#0f1629;padding:14px;border-radius:10px;line-height:1.6;margin-bottom:1.2rem}
.badges{margin-bottom:1.2rem}
.badge{display:inline-block;background:#c99a2b22;border:1px solid #c99a2b;color:#c99a2b;border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600;margin:3px}
.end-btns{display:flex;gap:10px;justify-content:center}
.end-btn{background:#c99a2b;color:#1a1a2e;border:none;padding:11px 24px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.end-btn.outline{background:transparent;border:1.5px solid #c99a2b;color:#c99a2b}
.end-btn:hover{opacity:.85}
</style>
</head>
<body>
<div class="wrap">

<!-- TITLE -->
<div class="screen active" id="title-screen">
  <div class="title-wrap">
    <div class="game-logo">🐴</div>
    <div class="game-title">The Donkey Renter</div>
    <div class="game-sub">משנה: השוכר את החמור</div>
    <div class="game-desc">You are Shmerel — a donkey renter in ancient Bavel.<br>Make halachic decisions based on the Mishna and discover whether you're חייב or פטור!</div>
    <button class="start-btn" onclick="startGame()">🎮 Start Game</button>
  </div>
</div>

<!-- GAME -->
<div class="screen" id="game-screen">
  <!-- Scene Canvas -->
  <div class="scene-canvas" id="scene-canvas">
    <div class="sky" id="sky"></div>
    <div class="sun" id="sun"></div>
    <div class="cloud" id="cloud1">
      <svg width="80" height="30" viewBox="0 0 80 30"><ellipse cx="40" cy="20" rx="38" ry="16" fill="white" opacity=".85"/><ellipse cx="28" cy="18" rx="20" ry="14" fill="white" opacity=".85"/><ellipse cx="54" cy="18" rx="18" ry="12" fill="white" opacity=".85"/></svg>
    </div>
    <div class="cloud2" id="cloud2" style="left:140px">
      <svg width="60" height="24" viewBox="0 0 60 24"><ellipse cx="30" cy="16" rx="28" ry="12" fill="white" opacity=".7"/><ellipse cx="20" cy="14" rx="16" ry="10" fill="white" opacity=".7"/><ellipse cx="42" cy="14" rx="14" ry="9" fill="white" opacity=".7"/></svg>
    </div>
    <div class="mountain" id="mountain" style="left:10px">
      <svg width="180" height="120" viewBox="0 0 180 120"><polygon points="90,10 10,120 170,120" fill="#4a6741"/><polygon points="90,10 60,55 120,55" fill="white" opacity=".6"/><polygon points="130,30 80,120 180,120" fill="#3a5731" opacity=".7"/></svg>
    </div>
    <div class="tree" id="tree1" style="right:40px">
      <svg width="30" height="50" viewBox="0 0 30 50"><rect x="12" y="30" width="6" height="20" fill="#5c3d11"/><polygon points="15,0 2,32 28,32" fill="#2d6a2d"/><polygon points="15,8 4,36 26,36" fill="#3a8a3a"/></svg>
    </div>
    <div class="tree" id="tree2" style="right:80px">
      <svg width="24" height="40" viewBox="0 0 24 40"><rect x="9" y="24" width="5" height="16" fill="#5c3d11"/><polygon points="12,0 1,26 23,26" fill="#2d6a2d"/></svg>
    </div>
    <div class="ground" id="ground"></div>
    <!-- Donkey -->
    <div class="donkey" id="donkey" style="left:140px">
      <div class="bubble" id="dk-bubble"></div>
      <div class="donkey-body">
        <div style="position:relative;width:60px;height:48px">
          <div class="dk-body">
            <div class="dk-tail"></div>
            <div class="dk-head">
              <div class="dk-ear"></div>
              <div class="dk-ear2"></div>
              <div class="dk-eye"></div>
              <div class="dk-nose"></div>
            </div>
          </div>
        </div>
        <div class="dk-legs">
          <div class="dk-leg walk1"></div>
          <div class="dk-leg walk2"></div>
          <div class="dk-leg walk3"></div>
          <div class="dk-leg walk4"></div>
        </div>
      </div>
    </div>
    <!-- Shmerel -->
    <div class="shmerel" id="shmerel" style="left:80px">
      <div class="bubble" id="sh-bubble"></div>
      <div class="shmerel-body">
        <div class="sh-hat"></div>
        <div class="sh-head">
          <div class="sh-eyes">
            <div class="sh-eye" id="eye-l"></div>
            <div class="sh-eye" id="eye-r"></div>
          </div>
          <div class="sh-mouth" id="mouth"></div>
        </div>
        <div class="sh-beard"></div>
        <div class="sh-coat">
          <div class="sh-arm-l" id="arm-l"></div>
          <div class="sh-arm-r" id="arm-r"></div>
        </div>
        <div class="sh-legs">
          <div class="sh-leg" id="leg-l"></div>
          <div class="sh-leg" id="leg-r"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- UI Panel -->
  <div class="ui-panel">
    <div class="top-bar">
      <div class="chapter-tag" id="chapter-tag">Scene 1</div>
      <div class="score-pill">⭐ <span id="score-val">0</span></div>
      <div class="lives-row" id="lives-row">❤️❤️❤️</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>
    <div class="scene-label" id="sc-label"></div>
    <div class="scene-title" id="sc-title"></div>
    <div class="story-text" id="sc-text"></div>
    <div class="heb-line" id="sc-heb" style="display:none"></div>
    <div class="q-text" id="sc-q"></div>
    <div class="choices" id="sc-choices"></div>
    <div class="result-box" id="result-box"></div>
    <button class="next-btn" id="next-btn" onclick="nextScene()">Continue →</button>
  </div>
</div>

<!-- END -->
<div class="screen" id="end-screen">
  <div class="end-wrap">
    <div class="end-trophy" id="end-trophy">🏆</div>
    <div class="end-title" id="end-title"></div>
    <div class="end-score-big" id="end-score"></div>
    <div class="end-pct" id="end-pct"></div>
    <div class="end-msg" id="end-msg"></div>
    <div class="badges" id="end-badges"></div>
    <div class="end-btns">
      <button class="end-btn" onclick="restartGame()">🔄 Play Again</button>
    </div>
  </div>
</div>

</div>
<script>
// ── SCENE ENVIRONMENTS ────────────────────────────────────────────────────
var ENVS = {
  stable:{sky:'linear-gradient(180deg,#1a3a5c 0%,#2d6a8a 100%)',ground:'#8B6914',sunClass:'',shLeft:80,dkLeft:140,mountain:true,bubbleSh:'Ready to rent a donkey! 🐴',bubbleDk:'Hee-haw!'},
  mountain:{sky:'linear-gradient(180deg,#1a2a4a 0%,#4a7aaa 100%)',ground:'#5a7a3a',sunClass:'',shLeft:60,dkLeft:130,mountain:true,bubbleSh:'Up the mountain we go!',bubbleDk:'Hee-haw...'},
  valley:{sky:'linear-gradient(180deg,#2a1a0a 0%,#8a5a2a 100%)',ground:'#7a9a4a',sunClass:'valley',shLeft:80,dkLeft:150,mountain:false,bubbleSh:'I took the wrong route!',bubbleDk:'It\'s so hot! 🥵'},
  court:{sky:'linear-gradient(180deg,#1a1a3a 0%,#3a3a6a 100%)',ground:'#5a4a2a',sunClass:'',shLeft:70,dkLeft:160,mountain:false,bubbleSh:'I have to go to Beis Din...'},
};

function setEnv(name, shBubble, dkBubble) {
  var e = ENVS[name] || ENVS.stable;
  document.getElementById('sky').style.background = e.sky;
  document.getElementById('ground').style.background = e.ground||'#7a6a3a';
  var sun = document.getElementById('sun');
  sun.className = 'sun' + (e.sunClass?' '+e.sunClass:'');
  document.getElementById('mountain').style.opacity = e.mountain ? '1' : '0';
  document.getElementById('shmerel').style.left = (e.shLeft||80)+'px';
  document.getElementById('donkey').style.left = (e.dkLeft||140)+'px';
  if(shBubble !== undefined) showBubble('sh', shBubble);
  if(dkBubble !== undefined) showBubble('dk', dkBubble);
}

function showBubble(who, text, duration) {
  var b = document.getElementById(who+'-bubble');
  if(!text){b.classList.remove('show');return;}
  b.textContent = text;
  b.classList.add('show');
  if(duration !== false) setTimeout(function(){b.classList.remove('show')}, duration||2500);
}

function setFace(mood) {
  var el = document.getElementById('eye-l');
  var er = document.getElementById('eye-r');
  var m = document.getElementById('mouth');
  if(mood==='happy'){
    el.className='sh-eye happy';er.className='sh-eye happy';
    m.className='sh-mouth happy';
  } else if(mood==='sad'){
    el.className='sh-eye sad';er.className='sh-eye sad';
    m.className='sh-mouth sad';
  } else {
    el.className='sh-eye';er.className='sh-eye';
    m.className='sh-mouth';
  }
}

function walk(on) {
  var ll = document.getElementById('leg-l');
  var lr = document.getElementById('leg-r');
  if(on){ll.className='sh-leg walk1';lr.className='sh-leg walk2';}
  else{ll.className='sh-leg';lr.className='sh-leg';}
}

// ── SCENES DATA ───────────────────────────────────────────────────────────
var SCENES = [
  {
    env:'stable', envBubbleSh:'Time to rent a donkey!', envBubbleDk:'Hee-haw!',
    label:'The Mishna — Introduction',
    title:'Who is a שוכר?',
    text:'Before the adventure begins — let\'s check your knowledge! Shmerel wants to rent a donkey from Reuven to travel to the mountains. What type of שומר (guardian) is a שוכר (renter)?',
    heb:'שוֹכֵר — כְּשׁוֹמֵר שָׂכָר',
    q:'What is the liability of a שוכר?',
    choices:[
      {t:'Same as a שומר שכר (paid guard) — חייב for theft and loss, פטור for unavoidable accidents',correct:true},
      {t:'Same as a שומר חינם (unpaid guard) — only liable for negligence',correct:false},
      {t:'Same as a שואל (borrower) — liable for everything including accidents',correct:false},
      {t:'Not liable for anything since he\'s paying for the rental',correct:false}
    ],
    correct:'✅ Correct! A שוכר has the same liability as a שומר שכר — he is חייב for theft and loss, but פטור for unavoidable accidents (אונס). This is the baseline — but things change when you deviate from the owner\'s instructions!',
    wrong:'❌ A שוכר (renter) has the same liability as a שומר שכר (paid guard) — חייב for theft and loss, פטור for true אונס. But as we\'ll see, this changes when you take the donkey somewhere you weren\'t supposed to!',
    pts:10, mood_correct:'happy', mood_wrong:'sad', anim_correct:'bounce', anim_wrong:'shake'
  },
  {
    env:'mountain', envBubbleSh:'Up the mountain!', envBubbleDk:'Hee-haw! 🏔️',
    label:'The Mishna — רישא',
    title:'You took the donkey the WRONG way!',

var idx=0, score=0, lives=3, answered=false;
var MAX_PTS = SCENES.reduce(function(a,s){return a+s.pts},0);

function startGame(){idx=0;score=0;lives=3;answered=false;showScreen('game-screen');renderScene();}
function restartGame(){startGame();}
function showScreen(id){document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active')});document.getElementById(id).classList.add('active');}

function renderScene(){
  answered=false;
  var s=SCENES[idx];
  setEnv(s.env, s.envBubbleSh, s.envBubbleDk);
  setFace('normal');
  walk(false);

  document.getElementById('chapter-tag').textContent='Scene '+(idx+1)+' of '+SCENES.length;
  document.getElementById('score-val').textContent=score;
  document.getElementById('lives-row').textContent='❤️'.repeat(lives)+'🖤'.repeat(3-lives);
  document.getElementById('prog').style.width=(idx/SCENES.length*100)+'%';
  document.getElementById('sc-label').textContent=s.label;
  document.getElementById('sc-title').textContent=s.title;
  document.getElementById('sc-text').textContent=s.text;
  var heb=document.getElementById('sc-heb');
  if(s.heb){heb.textContent=s.heb;heb.style.display='block';}else{heb.style.display='none';}
  document.getElementById('sc-q').textContent=s.q;

  var ch=document.getElementById('sc-choices');ch.innerHTML='';
  var shuffled=s.choices.map(function(c){return c}).sort(function(){return Math.random()-.5});
  shuffled.forEach(function(c){
    var b=document.createElement('button');b.className='choice';b.textContent=c.t;b.dataset.correct=c.correct;
    b.onclick=function(){if(!answered)pick(b,c.correct,s);};
    ch.appendChild(b);
  });

  document.getElementById('result-box').style.display='none';
  document.getElementById('next-btn').style.display='none';

  setTimeout(function(){showBubble('sh','',false);showBubble('dk','',false);},2600);
}

function pick(btn, correct, s){
  answered=true;
  document.querySelectorAll('.choice').forEach(function(b){b.disabled=true;});
  var rb=document.getElementById('result-box');

  if(correct){
    btn.classList.add('correct');
    score+=s.pts;
    document.getElementById('score-val').textContent=score;
    setFace('happy');
    showBubble('sh','Correct! 🎉');
    var sh=document.getElementById('shmerel');
    sh.classList.add('bounce');
    setTimeout(function(){sh.classList.remove('bounce');},600);
    rb.className='result-box correct';
    rb.innerHTML='<div class="result-title">✅ Correct! +'+s.pts+' points</div><div>'+s.correct+'</div>';
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.choice').forEach(function(b){if(b.dataset.correct==='true')b.classList.add('correct');});
    lives=Math.max(0,lives-1);
    document.getElementById('lives-row').textContent='❤️'.repeat(lives)+'🖤'.repeat(3-lives);
    setFace('sad');
    showBubble('sh','Oops! 😬');
    var dk=document.getElementById('donkey');
    dk.classList.add('hurt');setTimeout(function(){dk.classList.remove('hurt');},500);
    var sh2=document.getElementById('shmerel');
    sh2.classList.add('shake');setTimeout(function(){sh2.classList.remove('shake');},400);
    rb.className='result-box wrong';
    rb.innerHTML='<div class="result-title">❌ Not quite!</div><div>'+s.wrong+'</div>';
  }
  rb.style.display='block';
  var nx=document.getElementById('next-btn');
  nx.textContent=idx<SCENES.length-1?'Continue →':'See Final Score 🏆';
  nx.style.display='block';
}

function nextScene(){
  idx++;
  if(idx>=SCENES.length){showEnd();return;}
  renderScene();
}

function showEnd(){
  document.getElementById('prog').style.width='100%';
  var pct=Math.round(score/MAX_PTS*100);
  var trophy,title,msg;
  if(pct>=90){trophy='🏆';title='Mishna Master!';msg='Incredible! You understand every case in the Mishna — when you\'re חייב, when you\'re פטור, and why. The Mishna is proud of you!';}
  else if(pct>=70){trophy='⭐';title='Great Work!';msg='Solid understanding of the Mishna! Review the cases you missed — pay attention to whether the damage is related or unrelated to the deviation.';}
  else if(pct>=50){trophy='📖';title='Good Effort!';msg='You know the basics! The key rule to remember: related damage = חייב, unrelated damage = פטור. Go over the Mishna again!';}
  else{trophy='💪';title='Keep Going!';msg='The Mishna has many cases — keep reviewing! The core idea: when you deviate from the agreed route, you become responsible for related damage.';}
  document.getElementById('end-trophy').textContent=trophy;
  document.getElementById('end-title').textContent=title;
  document.getElementById('end-score').textContent=score+' / '+MAX_PTS;
  document.getElementById('end-pct').textContent=pct+'% · '+(3-lives)+' mistake'+(3-lives!==1?'s':'')+' made';
  document.getElementById('end-msg').textContent=msg;
  var badges='';
  if(pct===100)badges+='<span class="badge">🌟 Perfect Score</span>';
  if(lives===3)badges+='<span class="badge">❤️ No Mistakes</span>';
  if(pct>=80)badges+='<span class="badge">📜 Mishna Scholar</span>';
  document.getElementById('end-badges').innerHTML=badges;
  showScreen('end-screen');
}
